<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #1a1625; }

    #unity-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    #unity-canvas {
      width: 100%; height: 100%;
      background: #1a1625;
      cursor: default;
    }

    /* Loading overlay */
    #unity-loading-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1625 0%, #2d1f4e 50%, #1a1625 100%);
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    #unity-loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: #e8d5b5;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(232, 213, 181, 0.3);
    }

    .loading-subtitle {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.9rem;
      color: #8b7fa3;
      margin-bottom: 2.5rem;
      letter-spacing: 0.1em;
    }

    /* Progress bar */
    .progress-container {
      width: min(400px, 80vw);
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c5cbf, #e8d5b5);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      color: #6b5f83;
    }

    /* Warning banner */
    #unity-warning { display: none; }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="unity-loading-overlay">
      <div class="loading-title">ARCANA BOARD</div>
      <div class="loading-subtitle">Loading...</div>
      <div class="progress-container">
        <div class="progress-bar" id="unity-progress-bar"></div>
      </div>
      <div class="progress-text" id="unity-progress-text">0%</div>
    </div>
  </div>

  <div id="unity-warning"></div>

  <script>
    var container = document.getElementById("unity-container");
    var canvas = document.getElementById("unity-canvas");
    var overlay = document.getElementById("unity-loading-overlay");
    var progressBar = document.getElementById("unity-progress-bar");
    var progressText = document.getElementById("unity-progress-text");

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";

    var config = {
      dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
      frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_WASM
      codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if MEMORY_FILENAME
      memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
      symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
      streamingAssetsUrl: "StreamingAssets",
      devicePixelRatio: 1,
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
    };

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = function () {
      createUnityInstance(canvas, config, function (progress) {
        var pct = Math.round(progress * 100);
        progressBar.style.width = pct + "%";
        progressText.textContent = pct + "%";
      }).then(function (instance) {
        overlay.classList.add("hidden");
        setTimeout(function () { overlay.remove(); }, 600);
      }).catch(function (message) {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
